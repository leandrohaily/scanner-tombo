<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* Estilos Simplificados para Performance */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; color: #fff; 
      background: #041127; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; padding: 14px; }
    .app { width: 100%; max-width: 430px; border-radius: 26px; padding: 18px; 
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(12px); text-align: center; }
    .scanner-shell { position: relative; border-radius: 22px; background: #000; min-height: 310px; overflow: hidden; margin: 15px 0; }
    #reader { width: 100%; min-height: 310px; }
    .scan-box { position: absolute; inset: 0; border: 2px solid #fff; border-radius: 12px; 
      margin: 90px 40px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); z-index: 10; pointer-events: none; }
    .cancel-btn { width: 100%; height: 50px; border-radius: 12px; border: none; background: #d62828; color: #fff; font-weight: bold; font-size: 16px; }
    #successOverlay { position: fixed; inset: 0; background: #00a859; display: none; align-items: center; justify-content: center; z-index: 9999; }
  </style>
</head>
<body>
  <div class="app">
    <div class="title" style="font-weight: bold;">Leitor Invent JUS</div>
    <div class="scanner-shell">
      <div id="reader"></div>
      <div class="scan-box"></div>
    </div>
    <button class="cancel-btn" onclick="voltar(true)">✕ Cancelar</button>
  </div>

  <div id="successOverlay">
    <div style="text-align: center; color: white;">
      <div style="font-size: 50px;">✔</div>
      <div style="font-size: 20px;">Código Lido!</div>
    </div>
  </div>

  <script>
    const appReturnUrl = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let finalizando = false;

    async function voltar(isCancel = false, tombo = "") {
      if (finalizando) return;
      finalizando = true;

      // 1. Para a câmera
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) {}
      }

      // 2. Salva no LocalStorage (Garante que o dado não se perca no iOS)
      if (!isCancel && tombo) {
        localStorage.setItem('tombo_lido', tombo);
        localStorage.setItem('scanner_status', 'success');
      }

      // 3. Monta a URL de retorno com o parâmetro
      const url = new URL(appReturnUrl);
      if (tombo) url.searchParams.set("tombo", tombo);
      url.searchParams.set("scanner_return", "1");
      
      // Adiciona um timestamp para forçar o FlutterFlow a recarregar a página
      url.searchParams.set("t", Date.now());

      const finalUrl = url.toString();

      // 4. Redirecionamento forçado na mesma aba
      window.location.replace(finalUrl);
      
      // Fallback para Safari persistente
      setTimeout(() => {
        window.top.location.href = finalUrl;
      }, 100);
    }

    function onScanSuccess(decodedText) {
      const tombo = decodedText.replace(/\D/g, "");
      if (tombo && !finalizando) {
        document.getElementById("successOverlay").style.display = "flex";
        
        // Vibrate para feedback no iPhone
        if (navigator.vibrate) navigator.vibrate(200);
        
        voltar(false, tombo);
      }
    }

    window.addEventListener("load", () => {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: { width: 250, height: 120 } },
        onScanSuccess
      ).catch(err => {
        console.error("Erro ao iniciar camera", err);
      });
    });
  </script>
</body>
</html>
