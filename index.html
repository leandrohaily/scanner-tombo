<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: Arial, sans-serif; color: #fff;
      background: radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
                  linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
      overflow: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 14px; }
    .app {
      width: 100%; max-width: 430px; border-radius: 26px; padding: 18px 16px;
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38); position: relative;
    }
    .logo-wrap { display: flex; justify-content: center; margin-bottom: 10px; }
    .logo-wrap img { max-width: 210px; height: auto; }
    
    .scanner-shell {
      position: relative; overflow: hidden; border-radius: 22px;
      background: #000; height: 300px;
      display: flex; align-items: center; justify-content: center;
    }
    #reader { width: 100%; height: 100%; background: #000; }
    #reader video { object-fit: cover !important; height: 300px !important; border-radius: 22px; }

    /* Botão de Ativação Centralizado */
    #start-btn {
      position: absolute; z-index: 50;
      background: #34c759; color: white; border: none;
      padding: 15px 30px; border-radius: 12px;
      font-weight: bold; font-size: 16px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(52, 199, 89, 0.4);
    }

    .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 20; display: none; }
    .scan-box {
      position: absolute; left: 50%; top: 50%;
      width: 85%; height: 150px; transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.95); border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.5);
    }
    .corner { position: absolute; width: 20px; height: 20px; border: 4px solid #fff; }
    .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
    .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
    .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
    .br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }
    
    .laser-line {
      position: absolute; left: 5%; right: 5%; height: 2px; background: #ff4747;
      box-shadow: 0 0 10px #ff4747; animation: laserMove 2s ease-in-out infinite;
    }
    @keyframes laserMove { 0%, 100% { top: 15%; } 50% { top: 85%; } }

    .reading-status { margin-top: 14px; text-align: center; font-size: 14px; font-weight: 600; min-height: 1.2em; }
    .cancel-wrap { margin-top: 16px; display: flex; justify-content: center; }
    .cancel-btn {
      min-width: 180px; height: 48px; border: none; border-radius: 14px;
      background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%);
      color: #fff; font-weight: 700; cursor: pointer;
    }
    #successOverlay {
      position: fixed; inset: 0; background: rgba(0, 168, 89, 0.98);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="logo-wrap"><img src="logo-inventjus.png" alt="Invent JUS"></div>
    <div class="reading-status" id="status">Toque no botão para escanear</div>

    <div class="scanner-shell">
      <button id="start-btn" onclick="iniciarScanner()">ABRIR CÂMERA</button>
      <div id="reader"></div>
      <div class="overlay" id="overlay">
        <div class="scan-box">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="laser-line"></div>
        </div>
      </div>
    </div>

    <div class="cancel-wrap">
      <button class="cancel-btn" onclick="retornarAoApp('')">✕ Cancelar</button>
    </div>
  </div>

  <div id="successOverlay">
    <div style="text-align:center"><div style="font-size:70px">✔</div><b>LIDO!</b></div>
  </div>

  <script>
    const appReturnUrl = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let processando = false;

    async function retornarAoApp(codigo = "") {
      if (processando) return;
      processando = true;
      if (html5QrCode) { try { await html5QrCode.stop(); } catch (e) {} }

      const url = new URL(appReturnUrl);
      if (codigo) url.searchParams.set("tombo", codigo.replace(/\D/g, ""));
      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("t", Date.now());

      if (codigo) document.getElementById("successOverlay").style.display = "flex";
      window.top.location.replace(url.toString());
    }

    async function iniciarScanner() {
      const btn = document.getElementById('start-btn');
      const status = document.getElementById('status');
      const overlay = document.getElementById('overlay');
      
      btn.style.display = "none";
      status.innerText = "Iniciando...";

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 25,
        qrbox: { width: 300, height: 150 },
        aspectRatio: 1.0
      };

      try {
        // Chamada direta disparada pelo CLIQUE do usuário (Safari adora isso)
        await html5QrCode.start({ facingMode: "environment" }, config, (text) => {
          if (!processando) {
            if (navigator.vibrate) navigator.vibrate(100);
            retornarAoApp(text);
          }
        });
        
        status.innerText = "Scanner Ativo";
        overlay.style.display = "block";

        // Tenta melhorar o foco após abrir
        const track = html5QrCode.getRunningTrack();
        if (track && track.getCapabilities().focusMode?.includes('continuous')) {
          track.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
        }
      } catch (err) {
        status.innerText = "Erro ao acessar câmera.";
        btn.style.display = "block";
        btn.innerText = "TENTAR NOVAMENTE";
      }
    }
  </script>
</body>
</html>
