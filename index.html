<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
        linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      border-radius: 26px;
      padding: 18px 16px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    .logo-wrap img {
      max-width: 210px;
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28));
    }

    .title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .scanner-shell {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: #000;
      min-height: 320px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 10px 30px rgba(0,0,0,0.32);
    }

    .preview-wrap {
      position: relative;
      width: 100%;
      min-height: 320px;
      background: #000;
      overflow: hidden;
      border-radius: 22px;
    }

    #cameraPreview {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: none;
      background: #000;
      border-radius: 22px;
    }

    #reader {
      width: 100%;
      min-height: 320px;
      background: transparent;
      border: none !important;
      position: absolute;
      inset: 0;
      z-index: 2;
      overflow: hidden;
    }

    #reader,
    #reader *,
    #reader video,
    #reader img,
    #reader canvas {
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
    }

    #reader__dashboard,
    #reader__dashboard_section,
    #reader__header_message {
      display: none !important;
    }

    #reader video {
      width: 100% !important;
      height: 320px !important;
      object-fit: cover !important;
      border-radius: 22px;
      background: transparent !important;
    }

    #reader__scan_region {
      background: transparent !important;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .scan-box {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 84%;
      max-width: 330px;
      height: 130px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.42),
        inset 0 0 0 1px rgba(255,255,255,0.22),
        0 0 14px rgba(255,255,255,0.08);
      background: transparent;
      overflow: hidden;
    }

    .scan-box::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 4px solid #fff;
      z-index: 3;
    }

    .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 10px; }
    .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 10px; }
    .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 10px; }
    .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 10px; }

    .laser-glow {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 80px;
      top: 12%;
      transform: translateY(-50%);
      background: linear-gradient(to bottom, rgba(255, 50, 50, 0), rgba(255, 50, 50, 0.18), rgba(255, 50, 50, 0));
      filter: blur(8px);
      animation: laserMoveGlow 2.2s ease-in-out infinite;
      z-index: 1;
    }

    .laser-line {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 4px;
      top: 12%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255,40,40,0.12), #ff4747 18%, #ffffff 50%, #ff4747 82%, rgba(255,40,40,0.12));
      box-shadow: 0 0 8px rgba(255, 60, 60, 0.95), 0 0 18px rgba(255, 60, 60, 0.70), 0 0 30px rgba(255, 60, 60, 0.35);
      animation: laserMove 2.2s ease-in-out infinite;
      z-index: 2;
    }

    .laser-sheen {
      position: absolute;
      left: -30%;
      top: 0;
      width: 30%;
      height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.08), rgba(255,255,255,0));
      transform: skewX(-20deg);
      animation: sheenSweep 2.8s linear infinite;
      z-index: 1;
    }

    @keyframes laserMove { 0% { top: 12%; } 50% { top: 88%; } 100% { top: 12%; } }
    @keyframes laserMoveGlow { 0% { top: 12%; } 50% { top: 88%; } 100% { top: 12%; } }
    @keyframes sheenSweep { 0% { left: -35%; } 100% { left: 115%; } }

    .scan-hint {
      position: absolute;
      left: 50%;
      top: calc(50% + 88px);
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      text-align: center;
      width: 90%;
      max-width: 320px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45);
    }

    .reading-status {
      margin-top: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2px;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 20px;
      text-align: left;
      animation: dots 1.4s steps(4, end) infinite;
      vertical-align: baseline;
    }

    @keyframes dots {
      0% { content: ""; }
      25% { content: "."; }
      50% { content: ".."; }
      75% { content: "..."; }
      100% { content: ""; }
    }

    .start-wrap,
    .cancel-wrap {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .start-btn,
    .cancel-btn {
      min-width: 180px;
      height: 48px;
      border: none;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .start-btn { background: linear-gradient(180deg, #1565c0 0%, #0d47a1 100%); }
    .cancel-btn { background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%); }

    .start-btn:active,
    .cancel-btn:active {
      transform: scale(0.97);
      filter: brightness(1.06);
    }

    #successOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 168, 89, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s ease;
      z-index: 9999;
    }

    #successOverlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .successBox {
      text-align: center;
      color: white;
      padding: 24px;
      animation: popIn 0.12s ease;
    }

    .checkmark { font-size: 72px; line-height: 1; margin-bottom: 12px; }
    .successText { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .successSubtext { font-size: 14px; opacity: 0.96; }

    .status-message {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      min-height: 18px;
      line-height: 1.4;
      white-space: pre-line;
    }

    @keyframes popIn {
      from { transform: scale(0.82); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 420px) {
      .scanner-shell,
      .preview-wrap,
      #cameraPreview,
      #reader,
      #reader video {
        min-height: 290px;
        height: 290px !important;
      }

      .scan-box {
        width: 86%;
        height: 120px;
      }

      .scan-hint {
        top: calc(50% + 82px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap">
      <img src="logo-inventjus.png" alt="Invent JUS">
    </div>

    <div class="title">Leitor de código de barras</div>
    <div class="subtitle">
      Centralize a etiqueta patrimonial dentro da área de leitura.
    </div>

    <div class="scanner-shell">
      <div class="preview-wrap">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div id="reader"></div>
      </div>

      <div class="overlay">
        <div class="scan-box">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <div class="laser-glow"></div>
          <div class="laser-line"></div>
          <div class="laser-sheen"></div>
        </div>

        <div class="scan-hint">Aproxime e mantenha o código alinhado na horizontal</div>
      </div>
    </div>

    <div class="reading-status">
      Lendo<span class="dots"></span>
    </div>

    <div class="start-wrap">
      <button class="start-btn" id="startBtn">📷 Iniciar câmera</button>
    </div>

    <div class="status-message" id="statusMessage"></div>

    <div class="cancel-wrap">
      <button class="cancel-btn" id="cancelBtn">✕ Cancelar</button>
    </div>
  </div>

  <audio id="beepSound" preload="auto" playsinline webkit-playsinline>
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    <source src="https://www.soundjay.com/button/sounds/beep-07a.mp3" type="audio/mpeg">
  </audio>

  <div id="successOverlay">
    <div class="successBox">
      <div class="checkmark">✔</div>
      <div class="successText">Tombo lido com sucesso</div>
      <div class="successSubtext">Retornando ao Invent JUS...</div>
    </div>
  </div>

  <script>
    const scannerReturnUrl = "https://inventario-patrimonial-orzkxr.flutterflow.app/scannerRetorno";
    const readerElementId = "reader";

    let html5QrCode = null;
    let previewStream = null;
    let jaLeu = false;
    let cameraIniciada = false;
    let leituraEmAndamento = false;
    let scannerIniciando = false;
    let audioUnlocked = false;
    let audioContext = null;

    const beepElement = document.getElementById("beepSound");
    const startBtn = document.getElementById("startBtn");
    const cancelBtn = document.getElementById("cancelBtn");
    const statusMessage = document.getElementById("statusMessage");
    const cameraPreview = document.getElementById("cameraPreview");

    function setStatus(msg) {
      if (statusMessage) statusMessage.textContent = msg || "";
    }

    function onlyDigits(value) {
      return (value || "").replace(/\D/g, "");
    }

    function isCodigoValido(value) {
      const digits = onlyDigits(value);
      return digits.length > 0 && digits.length <= 5;
    }

    function criarAudioContext() {
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) audioContext = new AudioCtx();
      }
      return audioContext;
    }

    async function unlockAudio() {
      if (audioUnlocked) return true;

      try {
        const ctx = criarAudioContext();
        if (ctx && ctx.state === "suspended") await ctx.resume();

        if (beepElement) {
          beepElement.muted = true;
          beepElement.currentTime = 0;
          const p = beepElement.play();
          if (p && typeof p.then === "function") await p.catch(() => {});
          beepElement.pause();
          beepElement.currentTime = 0;
          beepElement.muted = false;
        }

        audioUnlocked = true;
        return true;
      } catch (e) {
        console.warn("Falha ao desbloquear áudio:", e);
        return false;
      }
    }

    async function playBeep() {
      try {
        if (beepElement) {
          await unlockAudio();
          beepElement.pause();
          beepElement.currentTime = 0;
          const p = beepElement.play();
          if (p && typeof p.then === "function") await p;
          return;
        }
      } catch (e) {
        console.warn("Fallback para Web Audio:", e);
      }

      try {
        const ctx = criarAudioContext();
        if (!ctx) return;
        if (ctx.state === "suspended") await ctx.resume();

        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(1100, ctx.currentTime);

        gainNode.gain.setValueAtTime(0.0001, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.14);

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.14);
      } catch (e) {
        console.warn("Falha no beep fallback:", e);
      }
    }

    function vibrateOk() {
      if (navigator.vibrate) navigator.vibrate(120);
    }

    function showSuccess() {
      const overlay = document.getElementById("successOverlay");
      if (overlay) overlay.classList.add("show");
    }

    function irParaScannerRetorno(params = {}) {
      const url = new URL(scannerReturnUrl);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== null && value !== undefined && value !== "") {
          url.searchParams.set(key, value);
        }
      });
      window.location.replace(url.toString());
    }

    function returnToApp(decodedText) {
      const tombo = onlyDigits(decodedText);
      if (!tombo) {
        jaLeu = false;
        leituraEmAndamento = false;
        return;
      }
      irParaScannerRetorno({ tombo });
    }

    function voltarParaAppCancelado() {
      irParaScannerRetorno({ cancelado: "true" });
    }

    async function pararPreview() {
      try {
        if (previewStream) {
          previewStream.getTracks().forEach(track => track.stop());
          previewStream = null;
        }

        if (cameraPreview) {
          cameraPreview.pause();
          cameraPreview.srcObject = null;
          cameraPreview.style.display = "none";
        }
      } catch (e) {
        console.warn("Erro ao parar preview:", e);
      }
    }

    async function cancelarLeitura() {
      try {
        if (cameraIniciada && html5QrCode) {
          await html5QrCode.stop().catch(() => {});
          cameraIniciada = false;
        }
      } catch (e) {
        console.warn("Erro ao parar câmera:", e);
      } finally {
        await pararPreview();
        voltarParaAppCancelado();
      }
    }

    async function encerrarScannerComRetorno(decodedText) {
      try {
        if (cameraIniciada && html5QrCode) {
          await html5QrCode.stop().catch(() => {});
          cameraIniciada = false;
        }
      } catch (e) {
        console.warn("Erro ao encerrar scanner:", e);
      }

      await pararPreview();
      returnToApp(decodedText);
    }

    async function onScanSuccess(decodedText) {
      if (jaLeu || leituraEmAndamento) return;
      if (!isCodigoValido(decodedText)) return;

      jaLeu = true;
      leituraEmAndamento = true;

      playBeep().catch(() => {});
      vibrateOk();
      showSuccess();

      setTimeout(async () => {
        await encerrarScannerComRetorno(decodedText);
      }, 80);
    }

    function onScanFailure(error) {
      // console.debug(error);
    }

    const config = {
      fps: 12,
      qrbox: { width: 300, height: 120 },
      aspectRatio: 1.7778,
      disableFlip: true,
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: false
      },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39
      ]
    };

    async function iniciarPreviewCamera() {
      if (!window.isSecureContext) {
        throw new Error("Página sem HTTPS.");
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("getUserMedia indisponível.");
      }

      previewStream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      if (!cameraPreview) {
        throw new Error("Elemento de preview não encontrado.");
      }

      cameraPreview.srcObject = previewStream;
      cameraPreview.style.display = "block";

      try {
        await cameraPreview.play();
      } catch (e) {
        console.warn("Falha no play do preview:", e);
      }

      return true;
    }

    async function iniciarScannerHtml5Qrcode() {
      if (typeof Html5Qrcode === "undefined") {
        throw new Error("Biblioteca Html5Qrcode não carregou.");
      }

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode(readerElementId, { verbose: false });
      }

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );
        return true;
      } catch (erro1) {
        console.warn("Falha com facingMode:", erro1);

        const cameras = await Html5Qrcode.getCameras();
        if (!cameras || cameras.length === 0) {
          throw new Error("Nenhuma câmera encontrada para o scanner.");
        }

        const cameraPreferida =
          cameras.find(c => /back|rear|environment|traseira/i.test(c.label || "")) ||
          cameras[0];

        await html5QrCode.start(
          cameraPreferida.id,
          config,
          onScanSuccess,
          onScanFailure
        );
        return true;
      }
    }

    async function iniciarScanner() {
      if (cameraIniciada || scannerIniciando) return;

      scannerIniciando = true;
      if (startBtn) startBtn.disabled = true;

      try {
        await unlockAudio();

        setStatus("Solicitando câmera...");
        await iniciarPreviewCamera();
        setStatus("Preview da câmera ativo.");

        try {
          await new Promise(resolve => setTimeout(resolve, 350));
          setStatus("Iniciando leitura do código...");
          await iniciarScannerHtml5Qrcode();

          cameraIniciada = true;
          setStatus("Câmera ativa. Aponte para o código.");
          if (startBtn) startBtn.style.display = "none";
        } catch (scanError) {
          console.warn("Falha no html5-qrcode após preview:", scanError);

          setStatus(
            "A câmera abriu, mas o leitor não iniciou.\n" +
            "Isso indica limitação do WebView para leitura automática."
          );

          if (startBtn) {
            startBtn.disabled = false;
            startBtn.textContent = "📷 Tentar leitura novamente";
          }
        }
      } catch (e) {
        console.error("Erro ao iniciar câmera:", e);

        const msg = String(e && e.message ? e.message : e);

        if (msg.includes("Permission") || msg.includes("denied")) {
          setStatus("Permissão da câmera negada.");
        } else if (msg.includes("HTTPS")) {
          setStatus("A página precisa estar em HTTPS.");
        } else if (msg.includes("getUserMedia")) {
          setStatus("Este WebView não liberou a câmera.");
        } else if (msg.includes("NotReadableError")) {
          setStatus("A câmera está ocupada por outro app.");
        } else {
          setStatus("Não foi possível abrir a câmera.");
        }

        if (startBtn) startBtn.disabled = false;
      } finally {
        scannerIniciando = false;
      }
    }

    function prepararAudioSemBloquearCamera() {
      const tentar = () => unlockAudio().catch(() => {});
      document.addEventListener("touchstart", tentar, { once: true, passive: true });
      document.addEventListener("click", tentar, { once: true, passive: true });
      document.addEventListener("pointerdown", tentar, { once: true, passive: true });
    }

    if (startBtn) startBtn.addEventListener("click", iniciarScanner);
    if (cancelBtn) cancelBtn.addEventListener("click", cancelarLeitura);

    window.addEventListener("load", () => {
      prepararAudioSemBloquearCamera();
      setStatus("Toque em 'Iniciar câmera'.");
    });
  </script>
</body>
</html>
