<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    /* Mantendo seus estilos originais */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; min-height: 100%; font-family: Arial, sans-serif; color: #fff; 
      background: radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%), 
      linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%); }
    body { display: flex; align-items: center; justify-content: center; padding: 14px; }
    .app { width: 100%; max-width: 430px; border-radius: 26px; padding: 18px 16px 18px; 
      background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.10); 
      backdrop-filter: blur(12px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255,255,255,0.05); position: relative; }
    .logo-wrap { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .logo-wrap img { max-width: 210px; width: 100%; height: auto; object-fit: contain; display: block; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28)); }
    .title { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.2px; }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.82); line-height: 1.45; margin-bottom: 16px; }
    .scanner-shell { position: relative; overflow: hidden; border-radius: 22px; background: #000; min-height: 310px; 
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.32); }
    #reader { width: 100%; min-height: 310px; background: #000; border: none !important; position: relative; overflow: hidden; }
    #reader video { width: 100% !important; height: 310px !important; object-fit: cover !important; border-radius: 22px; }
    .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
    .scan-box { position: absolute; left: 50%; top: 50%; width: 78%; max-width: 300px; height: 120px; 
      transform: translate(-50%, -50%); border: 2px solid rgba(255,255,255,0.95); border-radius: 12px; 
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.42); background: transparent; overflow: hidden; }
    .corner { position: absolute; width: 24px; height: 24px; border: 4px solid #fff; z-index: 3; }
    .corner.tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 10px; }
    .corner.tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 10px; }
    .corner.bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 10px; }
    .corner.br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 10px; }
    .laser-line { position: absolute; left: 5%; right: 5%; height: 4px; top: 12%; border-radius: 999px; 
      background: linear-gradient(90deg, rgba(255,40,40,0.12), #ff4747 18%, #ffffff 50%, #ff4747 82%, rgba(255,40,40,0.12)); 
      box-shadow: 0 0 8px rgba(255, 60, 60, 0.95); animation: laserMove 2.2s ease-in-out infinite; z-index: 2; }
    @keyframes laserMove { 0% { top: 12%; } 50% { top: 88%; } 100% { top: 12%; } }
    .reading-status { margin-top: 14px; text-align: center; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.92); }
    .cancel-wrap { margin-top: 16px; display: flex; justify-content: center; }
    .cancel-btn { min-width: 180px; height: 48px; border: none; border-radius: 14px; 
      background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%); color: #fff; font-size: 15px; font-weight: 700; }
    #successOverlay { position: fixed; inset: 0; background: rgba(0, 168, 89, 0.94); display: flex; align-items: center; 
      justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 9999; }
    #successOverlay.show { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap"><img src="logo-inventjus.png" alt="Invent JUS"></div>
    <div class="title">Leitor de código de barras</div>
    <div class="subtitle">Centralize a etiqueta patrimonial dentro da área de leitura.</div>
    <div class="scanner-shell">
      <div id="reader"></div>
      <div class="overlay">
        <div class="scan-box">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="laser-line"></div>
        </div>
      </div>
    </div>
    <div class="reading-status">Lendo...</div>
    <div class="cancel-wrap">
      <button class="cancel-btn" onclick="cancelarLeitura()">✕ Cancelar</button>
    </div>
  </div>

  <audio id="beepSound" preload="auto" playsinline webkit-playsinline>
    <source src="https://www.soundjay.com/button/sounds/beep-07a.mp3" type="audio/mpeg">
  </audio>

  <div id="successOverlay">
    <div style="text-align: center; color: white;">
      <div style="font-size: 72px;">✔</div>
      <div style="font-size: 22px; font-weight: 800;">Sucesso!</div>
      <div style="font-size: 14px;">Processando leitura...</div>
    </div>
  </div>

  <script>
    const appReturnUrl = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let retornoExecutado = false;

    function onlyDigits(value) { return (value || "").replace(/\D/g, ""); }

    // --- FUNÇÃO CRUCIAL PARA iOS ---
    async function finalizarEIr(tombo = "") {
      if (retornoExecutado) return;
      retornoExecutado = true;

      // 1. Para a câmera IMEDIATAMENTE (libera o hardware)
      if (html5QrCode && html5QrCode.isScanning) {
        try {
          await html5QrCode.stop();
        } catch (e) { console.error(e); }
      }

      // 2. Monta a URL
      const url = new URL(appReturnUrl);
      if (tombo) url.searchParams.set("tombo", tombo);
      url.searchParams.set("scanner_return", "1");
      const urlFinal = url.toString();

      // 3. O SEGREDO PARA O SAFARI: 
      // Em PWAs ou WebViews de terceiros, o replace() as vezes falha.
      // Tentamos o replace e logo em seguida o top.location para garantir a mesma aba.
      window.location.replace(urlFinal);
      
      // Fallback para forçar a mesma janela se o replace falhar
      setTimeout(() => {
        window.top.location.href = urlFinal;
      }, 100);
    }

    async function onScanSuccess(decodedText) {
      if (retornoExecutado) return;
      
      // Feedback visual e sonoro
      document.getElementById("successOverlay").classList.add("show");
      const beep = document.getElementById("beepSound");
      if (beep) beep.play().catch(() => {});
      if (navigator.vibrate) navigator.vibrate(200);

      const tombo = onlyDigits(decodedText);
      if (tombo.length > 0) {
        // Pequeno atraso para o usuário ver o check de sucesso
        setTimeout(() => finalizarEIr(tombo), 500);
      }
    }

    async function cancelarLeitura() {
      await finalizarEIr("");
    }

    async function iniciarScanner() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { 
        fps: 15, 
        qrbox: { width: 280, height: 110 },
        aspectRatio: 1.7778,
        formatsToSupport: [ Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39 ]
      };

      try {
        await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
      } catch (e) {
        // Fallback para qualquer câmera se a "environment" falhar
        html5QrCode.start({ facingMode: "user" }, config, onScanSuccess).catch(err => console.error(err));
      }
    }

    window.addEventListener("load", () => {
      // Tenta iniciar automaticamente
      iniciarScanner();
      
      // Desbloqueia áudio no primeiro toque para o beep funcionar
      document.body.addEventListener('touchstart', () => {
        document.getElementById("beepSound").load();
      }, {once: true});
    });
  </script>
</body>
</html>
