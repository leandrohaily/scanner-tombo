<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Invent JUS</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Invent JUS">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(#041127, #071a3b);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

.logo {
  text-align: center;
  margin-bottom: 10px;
}

.logo img {
  max-width: 200px;
}

.title {
  text-align: center;
  font-weight: bold;
  margin-bottom: 12px;
}

/* SCANNER */
.scanner {
  position: relative;
  border-radius: 20px;
  overflow: hidden;
}

#reader {
  width: 100%;
}

/* AREA LEITURA */
.scan-area {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 92%;
  height: 48%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
}

/* LASER */
.laser {
  position: absolute;
  left: 5%;
  right: 5%;
  height: 4px;
  background: red;
  animation: scan 2s infinite;
}

@keyframes scan {
  0% { top: 10%; }
  50% { top: 90%; }
  100% { top: 10%; }
}

/* 🔵 TEXTO LENDO */
.status {
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

.dots::after {
  content: '';
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ''; }
  33% { content: '.'; }
  66% { content: '..'; }
  100% { content: '...'; }
}

/* 🔴 BOTÃO CANCELAR */
.cancel-btn {
  margin-top: 14px;
  width: 100%;
  height: 50px;
  border-radius: 12px;
  border: none;
  background: #e53935;
  color: white;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.cancel-btn:active {
  transform: scale(0.97);
}

/* ✔ SUCESSO */
#success {
  position: fixed;
  inset: 0;
  background: rgba(0,180,80,0.95);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 40px;
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

#success.show {
  opacity: 1;
}
</style>
</head>

<body>

<div class="app">

  <div class="logo">
    <img src="logo-inventjus.png">
  </div>

  <div class="title">Leitor de código de barras</div>

  <div class="scanner">
    <div id="reader"></div>

    <div class="scan-area">
      <div class="laser"></div>
    </div>
  </div>

  <!-- 🔵 STATUS -->
  <div class="status">
    Lendo<span class="dots"></span>
  </div>

  <!-- 🔴 BOTÃO -->
  <button class="cancel-btn" onclick="cancelar()">
    ❌ Cancelar leitura
  </button>

</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div id="success">✔</div>

<script>

const urlApp = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
const qr = new Html5Qrcode("reader");

function cancelar(){
  qr.stop().then(()=> window.location.href = urlApp);
}

function voltar(codigo){
  const tombo = codigo.replace(/\D/g,'');
  window.location.href = urlApp + "?tombo=" + tombo;
}

Html5Qrcode.getCameras().then(cameras => {

  qr.start(
    cameras[0].id,
    {
      fps: 10,
      qrbox: { width: 320, height: 180 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39
      ]
    },
    (text) => {

      document.getElementById("beep").play().catch(()=>{});
      document.getElementById("success").classList.add("show");

      qr.stop().then(()=>{
        setTimeout(()=> voltar(text), 700);
      });
    }
  );

});

</script>

</body>
</html>
