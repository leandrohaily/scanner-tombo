<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      width: 100%;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
        linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));
    }

    .app {
      width: 100%;
      max-width: 430px;
      border-radius: 26px;
      padding: 18px 16px 18px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 10px;
    }

    .logo-wrap img {
      max-width: 210px;
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28));
      -webkit-user-drag: none;
      user-select: none;
    }

    .title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      line-height: 1.45;
      margin-bottom: 16px;
    }

    .scanner-shell {
      position: relative;
      overflow: hidden;
      border-radius: 22px;
      background: #000;
      min-height: 310px;
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.08),
        0 10px 30px rgba(0,0,0,0.32);
    }

    #reader {
      width: 100%;
      min-height: 310px;
      background: #000;
      border: none !important;
      position: relative;
      overflow: hidden;
    }

    #reader,
    #reader *,
    #reader video,
    #reader img,
    #reader canvas {
      border: none !important;
      box-shadow: none !important;
    }

    #reader__dashboard,
    #reader__dashboard_section,
    #reader__header_message {
      display: none !important;
    }

    #reader video {
      width: 100% !important;
      height: 310px !important;
      object-fit: cover !important;
      border-radius: 22px;
      background: #000;
    }

    #reader > div {
      border: none !important;
    }

    #reader__scan_region {
      background: transparent !important;
    }

    .overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    .scan-box {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 78%;
      max-width: 300px;
      height: 120px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 12px;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.42),
        inset 0 0 0 1px rgba(255,255,255,0.22),
        0 0 14px rgba(255,255,255,0.08);
      background: transparent;
      overflow: hidden;
    }

    .scan-box::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      pointer-events: none;
    }

    .corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 4px solid #fff;
      z-index: 3;
    }

    .corner.tl {
      top: -2px;
      left: -2px;
      border-right: none;
      border-bottom: none;
      border-top-left-radius: 10px;
    }

    .corner.tr {
      top: -2px;
      right: -2px;
      border-left: none;
      border-bottom: none;
      border-top-right-radius: 10px;
    }

    .corner.bl {
      bottom: -2px;
      left: -2px;
      border-right: none;
      border-top: none;
      border-bottom-left-radius: 10px;
    }

    .corner.br {
      bottom: -2px;
      right: -2px;
      border-left: none;
      border-top: none;
      border-bottom-right-radius: 10px;
    }

    .laser-glow {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 80px;
      top: 12%;
      transform: translateY(-50%);
      background: linear-gradient(
        to bottom,
        rgba(255, 50, 50, 0),
        rgba(255, 50, 50, 0.18),
        rgba(255, 50, 50, 0)
      );
      filter: blur(8px);
      animation: laserMoveGlow 2.2s ease-in-out infinite;
      z-index: 1;
    }

    .laser-line {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 4px;
      top: 12%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(255,40,40,0.12),
        #ff4747 18%,
        #ffffff 50%,
        #ff4747 82%,
        rgba(255,40,40,0.12)
      );
      box-shadow:
        0 0 8px rgba(255, 60, 60, 0.95),
        0 0 18px rgba(255, 60, 60, 0.70),
        0 0 30px rgba(255, 60, 60, 0.35);
      animation: laserMove 2.2s ease-in-out infinite;
      z-index: 2;
    }

    .laser-sheen {
      position: absolute;
      left: -30%;
      top: 0;
      width: 30%;
      height: 100%;
      background: linear-gradient(
        90deg,
        rgba(255,255,255,0),
        rgba(255,255,255,0.08),
        rgba(255,255,255,0)
      );
      transform: skewX(-20deg);
      animation: sheenSweep 2.8s linear infinite;
      z-index: 1;
    }

    @keyframes laserMove {
      0%   { top: 12%; }
      50%  { top: 88%; }
      100% { top: 12%; }
    }

    @keyframes laserMoveGlow {
      0%   { top: 12%; }
      50%  { top: 88%; }
      100% { top: 12%; }
    }

    @keyframes sheenSweep {
      0%   { left: -35%; }
      100% { left: 115%; }
    }

    .scan-hint {
      position: absolute;
      left: 50%;
      top: calc(50% + 82px);
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      text-align: center;
      width: 90%;
      max-width: 320px;
      text-shadow: 0 1px 3px rgba(0,0,0,0.45);
    }

    .reading-status {
      margin-top: 14px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255,255,255,0.92);
      letter-spacing: 0.2px;
    }

    .dots::after {
      content: "";
      display: inline-block;
      width: 20px;
      text-align: left;
      animation: dots 1.4s steps(4, end) infinite;
      vertical-align: baseline;
    }

    @keyframes dots {
      0%   { content: ""; }
      25%  { content: "."; }
      50%  { content: ".."; }
      75%  { content: "..."; }
      100% { content: ""; }
    }

    .cancel-wrap {
      margin-top: 16px;
      display: flex;
      justify-content: center;
    }

    .cancel-btn {
      min-width: 180px;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.22),
        inset 0 1px 0 rgba(255,255,255,0.10),
        0 0 0 1px rgba(255,255,255,0.06);
      transition: transform 0.15s ease, filter 0.15s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .cancel-btn:active {
      transform: scale(0.97);
      filter: brightness(1.06);
    }

    #successOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 168, 89, 0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      z-index: 9999;
    }

    #successOverlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .successBox {
      text-align: center;
      color: white;
      padding: 24px;
      animation: popIn 0.28s ease;
    }

    .checkmark {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .successText {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .successSubtext {
      font-size: 14px;
      opacity: 0.96;
    }

    @keyframes popIn {
      from {
        transform: scale(0.82);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 420px) {
      .scanner-shell,
      #reader,
      #reader video {
        min-height: 280px;
        height: 280px !important;
      }

      .scan-box {
        width: 82%;
        height: 110px;
      }

      .scan-hint {
        top: calc(50% + 76px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap">
      <img src="logo-inventjus.png" alt="Invent JUS">
    </div>

    <div class="title">Leitor de código de barras</div>
    <div class="subtitle">
      Centralize a etiqueta patrimonial dentro da área de leitura.
    </div>

    <div class="scanner-shell">
      <div id="reader"></div>

      <div class="overlay">
        <div class="scan-box">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>

          <div class="laser-glow"></div>
          <div class="laser-line"></div>
          <div class="laser-sheen"></div>
        </div>

        <div class="scan-hint">Aproxime e mantenha o código alinhado na horizontal</div>
      </div>
    </div>

    <div class="reading-status" id="statusText">
      Lendo<span class="dots"></span>
    </div>

    <div class="cancel-wrap">
      <button class="cancel-btn" type="button" onclick="cancelarLeitura()">✕ Cancelar</button>
    </div>
  </div>

  <audio id="beepSound" preload="auto" playsinline webkit-playsinline>
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    <source src="https://www.soundjay.com/button/sounds/beep-07a.mp3" type="audio/mpeg">
  </audio>

  <div id="successOverlay">
    <div class="successBox">
      <div class="checkmark">✔</div>
      <div class="successText">Tombo lido com sucesso</div>
      <div class="successSubtext">Retornando ao Invent JUS...</div>
    </div>
  </div>

  <script>
  function getReturnUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("returnUrl") || "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
  }

const appReturnUrl = getReturnUrl();
    const readerElementId = "reader";

    let html5QrCode = null;
    let jaLeu = false;
    let cameraIniciada = false;
    let leituraEmAndamento = false;
    let scannerIniciando = false;
    let retornoExecutado = false;
    let paginaSaindo = false;

    let audioUnlocked = false;
    let audioContext = null;

    const beepElement = document.getElementById("beepSound");
    const statusText = document.getElementById("statusText");

    function setStatus(texto) {
      if (statusText) {
        statusText.textContent = texto;
      }
    }

    function onlyDigits(value) {
      return (value || "").replace(/\D/g, "");
    }

    function isCodigoValido(value) {
      const digits = onlyDigits(value);
      return digits.length > 0 && digits.length <= 5;
    }

    function criarAudioContext() {
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          audioContext = new AudioCtx();
        }
      }
      return audioContext;
    }

    async function unlockAudio() {
      if (audioUnlocked) return true;

      try {
        const ctx = criarAudioContext();

        if (ctx && ctx.state === "suspended") {
          await ctx.resume();
        }

        if (beepElement) {
          beepElement.muted = true;
          beepElement.currentTime = 0;
          const p = beepElement.play();
          if (p && typeof p.then === "function") {
            await p.catch(() => {});
          }
          beepElement.pause();
          beepElement.currentTime = 0;
          beepElement.muted = false;
        }

        audioUnlocked = true;
        return true;
      } catch (e) {
        console.warn("Falha ao desbloquear áudio:", e);
        return false;
      }
    }

    async function playBeep() {
      try {
        if (beepElement) {
          await unlockAudio();
          beepElement.pause();
          beepElement.currentTime = 0;
          const p = beepElement.play();
          if (p && typeof p.then === "function") {
            await p;
          }
          return;
        }
      } catch (e) {
        console.warn("Fallback para Web Audio:", e);
      }

      try {
        const ctx = criarAudioContext();
        if (!ctx) return;

        if (ctx.state === "suspended") {
          await ctx.resume();
        }

        const oscillator = ctx.createOscillator();
        const gainNode = ctx.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(1100, ctx.currentTime);

        gainNode.gain.setValueAtTime(0.0001, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.16);

        oscillator.connect(gainNode);
        gainNode.connect(ctx.destination);

        oscillator.start(ctx.currentTime);
        oscillator.stop(ctx.currentTime + 0.16);
      } catch (e) {
        console.warn("Falha no beep fallback:", e);
      }
    }

    function vibrateOk() {
      if (navigator.vibrate) {
        navigator.vibrate(180);
      }
    }

    function showSuccess() {
      const overlay = document.getElementById("successOverlay");
      if (overlay) {
        overlay.classList.add("show");
      }
    }

    function montarUrlRetorno(tombo = "") {
      const url = new URL(appReturnUrl);

      if (tombo) {
        url.searchParams.set("tombo", tombo);
      }

      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("_ts", Date.now().toString());

      return url.toString();
    }

    function salvarRetornoLocal(tombo = "") {
      try {
        if (tombo) {
          sessionStorage.setItem("tomboLido", tombo);
          localStorage.setItem("tomboLido", tombo);
        }
        sessionStorage.setItem("scannerRetornando", "1");
        localStorage.setItem("scannerRetornando", "1");
      } catch (e) {
        console.warn("Não foi possível salvar retorno local:", e);
      }
    }

    async function pararCameraSilenciosamente() {
      try {
        if (cameraIniciada && html5QrCode) {
          await html5QrCode.stop();
          cameraIniciada = false;
        }
      } catch (e) {
        console.warn("Erro ao parar câmera:", e);
      }

      try {
        if (html5QrCode) {
          await html5QrCode.clear();
        }
      } catch (e) {
        console.warn("Erro ao limpar scanner:", e);
      }
    }

    function tentarFecharOuVoltar(urlRetorno) {
      try {
        if (window.opener && !window.opener.closed) {
          window.location.replace(urlRetorno);
          return;
        }
      } catch (e) {}

      try {
        if (document.referrer && document.referrer.includes("inventario-patrimonial-orzkxr.flutterflow.app")) {
          window.location.replace(urlRetorno);
          return;
        }
      } catch (e) {}

      try {
        window.location.replace(urlRetorno);
      } catch (e) {
        window.location.href = urlRetorno;
      }
    }

    function executarRetorno(tombo = "") {
      if (retornoExecutado) return;
      retornoExecutado = true;
      paginaSaindo = true;

      salvarRetornoLocal(tombo);

      const urlRetorno = montarUrlRetorno(tombo);

      try {
        window.location.replace(urlRetorno);

        setTimeout(() => {
          tentarFecharOuVoltar(urlRetorno);
        }, 250);

      } catch (e) {
        console.warn("Erro no retorno. Aplicando fallback.", e);
        tentarFecharOuVoltar(urlRetorno);
      }
    }

    function returnToApp(decodedText) {
      const tombo = onlyDigits(decodedText);

      if (!tombo) {
        jaLeu = false;
        leituraEmAndamento = false;
        retornoExecutado = false;
        paginaSaindo = false;
        return;
      }

      executarRetorno(tombo);
    }

    function voltarParaApp() {
      executarRetorno("");
    }

    async function cancelarLeitura() {
      setStatus("Cancelando...");
      await pararCameraSilenciosamente();
      voltarParaApp();
    }

    async function encerrarScannerComRetorno(decodedText) {
      await pararCameraSilenciosamente();

      setTimeout(() => {
        returnToApp(decodedText);
      }, 850);
    }

    async function onScanSuccess(decodedText) {
      if (jaLeu || leituraEmAndamento || paginaSaindo) return;
      if (!isCodigoValido(decodedText)) return;

      jaLeu = true;
      leituraEmAndamento = true;

      setStatus("Código identificado");
      await playBeep();
      vibrateOk();
      showSuccess();
      await encerrarScannerComRetorno(decodedText);
    }

    function onScanFailure(error) {
    }

    const qrboxWidth = 280;
    const qrboxHeight = 110;

    const config = {
      fps: 10,
      qrbox: { width: qrboxWidth, height: qrboxHeight },
      aspectRatio: 1.7778,
      disableFlip: true,
      experimentalFeatures: {
        useBarCodeDetectorIfSupported: false
      },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E
      ]
    };

    async function iniciarScanner() {
      if (cameraIniciada || scannerIniciando || paginaSaindo) return;

      scannerIniciando = true;
      setStatus("Abrindo câmera...");

      try {
        if (typeof Html5Qrcode === "undefined") {
          setStatus("Falha ao carregar biblioteca");
          console.error("Biblioteca Html5Qrcode não carregou.");
          return;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("Câmera não suportada neste navegador");
          console.error("getUserMedia não suportado.");
          return;
        }

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode(readerElementId);
        }

        try {
          await html5QrCode.start(
            {
              facingMode: { ideal: "environment" }
            },
            config,
            onScanSuccess,
            onScanFailure
          );

          cameraIniciada = true;
          setStatus("Lendo código...");
        } catch (erroFacingMode) {
          console.warn("Falha com facingMode. Tentando lista de câmeras...", erroFacingMode);

          const cameras = await Html5Qrcode.getCameras();

          if (!cameras || cameras.length === 0) {
            setStatus("Nenhuma câmera encontrada");
            console.error("Nenhuma câmera encontrada.");
            return;
          }

          const cameraPreferida =
            cameras.find(c => /back|rear|environment|traseira/i.test(c.label)) ||
            cameras[0];

          await html5QrCode.start(
            cameraPreferida.id,
            config,
            onScanSuccess,
            onScanFailure
          );

          cameraIniciada = true;
          setStatus("Lendo código...");
        }

        setTimeout(() => {
          try {
            const capabilities = html5QrCode.getRunningTrackCapabilities?.();
            const settings = html5QrCode.getRunningTrackSettings?.();

            if (capabilities && html5QrCode.applyVideoConstraints) {
              const advanced = [];

              if (capabilities.focusMode && Array.isArray(capabilities.focusMode)) {
                if (capabilities.focusMode.includes("continuous")) {
                  advanced.push({ focusMode: "continuous" });
                }
              }

              if (
                capabilities.zoom &&
                typeof capabilities.zoom.max === "number" &&
                capabilities.zoom.max >= 1.5
              ) {
                const zoomDesejado = Math.min(1.5, capabilities.zoom.max);
                const zoomAtual = settings && settings.zoom ? settings.zoom : 1;

                if (zoomDesejado > zoomAtual) {
                  advanced.push({ zoom: zoomDesejado });
                }
              }

              if (advanced.length > 0) {
                html5QrCode.applyVideoConstraints({ advanced }).catch(err => {
                  console.warn("Falha ao aplicar constraints:", err);
                });
              }
            }
          } catch (e) {
            console.warn("Falha ao ajustar foco/zoom:", e);
          }
        }, 500);

      } catch (e) {
        console.error("Erro ao iniciar scanner:", e);
        setStatus("Não foi possível abrir a câmera");
      } finally {
        scannerIniciando = false;
      }
    }

    function prepararAudioSemBloquearCamera() {
      const tentar = () => unlockAudio().catch(() => {});
      document.addEventListener("touchstart", tentar, { once: true, passive: true });
      document.addEventListener("click", tentar, { once: true, passive: true });
      document.addEventListener("pointerdown", tentar, { once: true, passive: true });
    }

    function reativarScannerSeNecessario() {
      if (!cameraIniciada && !jaLeu && !leituraEmAndamento && !paginaSaindo) {
        iniciarScanner();
      }
    }

    window.addEventListener("load", () => {
      prepararAudioSemBloquearCamera();

      setTimeout(() => {
        iniciarScanner();
      }, 250);
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && !paginaSaindo) {
        setTimeout(() => {
          reativarScannerSeNecessario();
        }, 250);
      }
    });

    window.addEventListener("pageshow", (event) => {
      if (event.persisted && !paginaSaindo) {
        setTimeout(() => {
          reativarScannerSeNecessario();
        }, 250);
      }
    });

    window.addEventListener("beforeunload", () => {
      paginaSaindo = true;
