<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: Arial, sans-serif; color: #fff;
      background:
        radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
        linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
    }

    body { display: flex; align-items: center; justify-content: center; padding: 14px; }

    .app {
      width: 100%; max-width: 430px; border-radius: 26px; padding: 18px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }

    .logo-wrap { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .logo-wrap img { max-width: 210px; width: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28)); }

    .title { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.82); margin-bottom: 16px; }

    .scanner-shell {
      position: relative; overflow: hidden; border-radius: 22px;
      background: #000; min-height: 310px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.32);
    }

    #reader { width: 100%; min-height: 310px; background: #000; border: none !important; }
    #reader video { width: 100% !important; height: 310px !important; object-fit: cover !important; border-radius: 22px; }

    .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
    
    /* --- ÁREA DE CAPTURA AMPLIADA (160px de altura) --- */
    .scan-box {
      position: absolute; left: 50%; top: 50%; 
      width: 82%; height: 160px; /* Aumentado de 120px para 160px */
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.95); border-radius: 12px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.42);
    }

    .corner { position: absolute; width: 24px; height: 24px; border: 4px solid #fff; z-index: 3; }
    .tl { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 10px; }
    .tr { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 10px; }
    .bl { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 10px; }
    .br { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 10px; }

    .laser-line {
      position: absolute; left: 5%; right: 5%; height: 3px; top: 12%;
      background: #ff4747; box-shadow: 0 0 12px #ff4747;
      animation: laserMove 2.2s ease-in-out infinite; z-index: 2;
    }
    @keyframes laserMove { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

    .reading-status { margin-top: 14px; text-align: center; font-size: 15px; font-weight: 600; }
    
    .cancel-btn {
      min-width: 180px; height: 48px; border: none; border-radius: 14px;
      background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%);
      color: #fff; font-weight: 700; cursor: pointer; display: block; margin: 16px auto 0;
    }

    #successOverlay {
      position: fixed; inset: 0; background: rgba(0, 168, 89, 0.96);
      display: none; align-items: center; justify-content: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="logo-wrap">
      <img src="logo-inventjus.png" alt="Invent JUS">
    </div>

    <div class="title">Leitor de código de barras</div>
    <div class="subtitle">Aproxime a etiqueta patrimonial da área de leitura.</div>

    <div class="scanner-shell">
      <div id="reader"></div>
      <div class="overlay">
        <div class="scan-box">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
          <div class="laser-line"></div>
        </div>
      </div>
    </div>

    <div class="reading-status">Iniciando câmera...</div>

    <button class="cancel-btn" onclick="retornarAoApp('')">✕ Cancelar</button>
  </div>

  <div id="successOverlay">
    <div style="text-align:center">
      <div style="font-size:72px">✔</div>
      <div style="font-size:22px; font-weight:800">LIDO COM SUCESSO</div>
    </div>
  </div>

  <script>
    const APP_URL = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let isReturning = false;

    async function retornarAoApp(codigo) {
      if (isReturning) return;
      isReturning = true;

      if (codigo) document.getElementById("successOverlay").style.display = "flex";

      const url = new URL(APP_URL);
      if (codigo) url.searchParams.set("tombo", codigo.replace(/\D/g, ""));
      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("t", Date.now());

      if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
      }

      window.top.location.replace(url.toString());
    }

    function onScanSuccess(decodedText) {
      if (isReturning) return;
      if (navigator.vibrate) navigator.vibrate(100);
      retornarAoApp(decodedText);
    }

    function iniciarScanner() {
      html5QrCode = new Html5Qrcode("reader");
      
      const config = { 
        fps: 25, 
        // qrbox ampliado para capturar em uma área maior
        qrbox: { width: 300, height: 160 }, 
        aspectRatio: 1.0 
      };

      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
          document.querySelector('.reading-status').innerText = "Lendo...";
        })
        .catch(err => {
          console.error(err);
          document.querySelector('.reading-status').innerText = "Erro ao carregar câmera.";
        });
    }

    // Inicialização otimizada
    if (document.readyState === "complete" || document.readyState === "interactive") {
      setTimeout(iniciarScanner, 150);
    } else {
      window.addEventListener("load", () => setTimeout(iniciarScanner, 150));
    }
  </script>
</body>
</html>
