<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at top, rgba(64,110,255,0.20), transparent 34%),
        linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      border-radius: 26px;
      padding: 18px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .logo-wrap img {
      max-width: 200px;
    }

    .title {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .scanner-shell {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      background: #000;
    }

    #reader {
      width: 100%;
    }

    .scan-frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .scan-window {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 92%;
      height: 48%;
      transform: translate(-50%, -50%);
      border-radius: 18px;
      box-shadow:
        0 0 0 9999px rgba(0,0,0,0.38),
        inset 0 0 0 1px rgba(255,255,255,0.14);
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border: 4px solid #fff;
    }

    .tl { top:0; left:0; border-right:none; border-bottom:none; }
    .tr { top:0; right:0; border-left:none; border-bottom:none; }
    .bl { bottom:0; left:0; border-right:none; border-top:none; }
    .br { bottom:0; right:0; border-left:none; border-top:none; }

    .laser-line {
      position: absolute;
      left: 5%;
      right: 5%;
      height: 4px;
      background: red;
      top: 10%;
      box-shadow: 0 0 10px red;
      animation: scan 2s infinite;
    }

    @keyframes scan {
      0% { top:10%; }
      50% { top:90%; }
      100% { top:10%; }
    }

    /* 🔴 BOTÃO CANCELAR */
    .btn-cancelar {
      margin-top: 16px;
      width: 100%;
      height: 48px;
      border-radius: 12px;
      border: none;
      background: #e53935;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(229,57,53,0.4);
      transition: 0.2s;
    }

    .btn-cancelar:active {
      transform: scale(0.97);
      background: #c62828;
    }

    #successOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,180,80,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }

    #successOverlay.show {
      opacity: 1;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="logo-wrap">
    <img src="logo-inventjus.png">
  </div>

  <div class="title">Leitor de código de barras</div>

  <div class="scanner-shell">
    <div id="reader"></div>

    <div class="scan-frame">
      <div class="scan-window">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="laser-line"></div>
      </div>
    </div>
  </div>

  <!-- 🔥 BOTÃO NOVO -->
  <button class="btn-cancelar" onclick="cancelarLeitura()">
    Cancelar leitura
  </button>

</div>

<audio id="beepSound">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<div id="successOverlay">
  ✔
</div>

<script>

const appReturnUrl = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
const html5QrCode = new Html5Qrcode("reader");

function cancelarLeitura() {
  html5QrCode.stop().then(() => {
    window.location.href = appReturnUrl;
  }).catch(() => {
    window.location.href = appReturnUrl;
  });
}

function returnToApp(code) {
  const tombo = code.replace(/\D/g,'');
  if (!tombo) return;
  window.location.href = `${appReturnUrl}?tombo=${tombo}`;
}

Html5Qrcode.getCameras().then(cameras => {

  html5QrCode.start(
    cameras[0].id,
    {
      fps: 10,
      qrbox: { width: 320, height: 180 },
      formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39
      ]
    },
    (decodedText) => {

      document.getElementById("beepSound").play().catch(()=>{});
      document.getElementById("successOverlay").classList.add("show");

      html5QrCode.stop().then(() => {
        setTimeout(() => returnToApp(decodedText), 700);
      });
    }
  );

});

</script>

</body>
</html>
