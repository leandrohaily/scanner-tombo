<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Invent JUS">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: Arial, sans-serif; color: #fff;
      background: radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
                  linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
    }

    body { display: flex; align-items: center; justify-content: center; padding: 14px; }

    .app {
      width: 100%; max-width: 430px; border-radius: 26px; padding: 18px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }

    .logo-wrap { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .logo-wrap img { max-width: 210px; width: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28)); }

    .title { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.2px; }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.82); line-height: 1.45; margin-bottom: 16px; }

    .scanner-shell {
      position: relative; overflow: hidden; border-radius: 22px;
      background: #000; min-height: 310px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.32);
    }

    #reader { width: 100%; min-height: 310px; background: #000; border: none !important; }
    #reader video { width: 100% !important; height: 310px !important; object-fit: cover !important; border-radius: 22px; }

    /* Esconde o desenho padrão da biblioteca */
    #reader__scan_region svg { display: none !important; }

    .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 20; }

    /* ALTERAÇÃO AQUI: Removido o box-shadow que criava o retângulo escuro/largo */
    .scan-box {
      position: absolute; left: 50%; top: 50%;
      width: 82%; height: 160px; 
      transform: translate(-50%, -50%);
      border: none !important;
      box-shadow: none !important; /* Remove o retângulo de sombra */
    }

    .laser-line {
      position: absolute; left: 5%; right: 5%; height: 3px;
      background: #ff4747; box-shadow: 0 0 12px #ff4747;
      animation: laserMove 2.2s ease-in-out infinite;
      z-index: 22;
    }
    @keyframes laserMove { 0%, 100% { top: 12%; } 50% { top: 88%; } }

    .scan-hint {
      position: absolute;
      left: 50%;
      top: calc(50% + 100px);
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8); /* Aumentado o contraste do texto */
      z-index: 23;
    }

    .reading-status { margin-top: 14px; text-align: center; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.92); }

    .cancel-btn {
      display: block; margin: 16px auto 0; min-width: 180px; height: 48px;
      border: none; border-radius: 14px; background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%);
      color: #fff; font-weight: 700; cursor: pointer
