<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Scanner Invent JUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #000; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
    .container { width: 90%; max-width: 400px; text-align: center; }
    #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; }
    .btn-cancel { margin-top: 20px; width: 100%; padding: 15px; border: none; border-radius: 12px; background: #ff3b30; color: white; font-weight: bold; font-size: 16px; }
    #msg { position: fixed; inset: 0; background: #34c759; display: none; align-items: center; justify-content: center; z-index: 99; font-size: 24px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div id="reader"></div>
    <button class="btn-cancel" onclick="enviarRetorno('')">CANCELAR</button>
  </div>
  <div id="msg">LIDO!</div>

  <script>
    const finalURL = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let scanner = null;
    let finalizado = false;

    function enviarRetorno(valor) {
      if (finalizado) return;
      finalizado = true;

      if (scanner) {
        scanner.stop().catch(() => {});
      }

      const url = new URL(finalURL);
      if (valor) url.searchParams.set("tombo", valor);
      url.searchParams.set("scanner_return", "1");
      // Timestamp para evitar que o Safari use o cache da página anterior
      url.searchParams.set("cache", Date.now());

      if (valor) document.getElementById("msg").style.display = "flex";

      // O SEGREDO: Usar o replace no window.top para o Safari entender 
      // que deve reaproveitar a janela de onde veio o foco.
      setTimeout(() => {
        window.top.location.replace(url.toString());
      }, valor ? 400 : 0);
    }

    function onScanSuccess(text) {
      const tombo = text.replace(/\D/g, "");
      if (tombo && !finalizado) {
        enviarRetorno(tombo);
      }
    }

    window.onload = () => {
      scanner = new Html5Qrcode("reader");
      scanner.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: { width: 250, height: 150 } },
        onScanSuccess
      ).catch(e => console.error(e));
    };
  </script>
</body>
</html>
