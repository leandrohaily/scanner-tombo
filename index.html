<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      margin: 0; padding: 0; min-height: 100%;
      font-family: Arial, sans-serif; color: #fff;
      background: radial-gradient(circle at top, rgba(64, 110, 255, 0.20), transparent 34%),
                  linear-gradient(180deg, #030d20 0%, #071a3b 45%, #041127 100%);
    }

    body { display: flex; align-items: center; justify-content: center; padding: 14px; }

    .app {
      width: 100%; max-width: 430px; border-radius: 26px; padding: 18px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255,255,255,0.05);
      position: relative;
    }

    .logo-wrap { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
    .logo-wrap img { max-width: 210px; width: 100%; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.28)); }

    .title { text-align: center; font-size: 17px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.2px; }
    .subtitle { text-align: center; font-size: 13px; color: rgba(255,255,255,0.82); line-height: 1.45; margin-bottom: 16px; }

    .scanner-shell {
      position: relative; overflow: hidden; border-radius: 22px;
      background: #000; min-height: 310px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08), 0 10px 30px rgba(0,0,0,0.32);
    }

    #reader { width: 100%; min-height: 310px; background: #000; border: none !important; }
    #reader video { width: 100% !important; height: 310px !important; object-fit: cover !important; border-radius: 22px; }

    #reader__scan_region svg { display: none !important; }

    .overlay { position: absolute; inset: 0; pointer-events: none; z-index: 20; }

    .scan-box {
      position: absolute; left: 50%; top: 50%;
      width: 82%; height: 160px; 
      transform: translate(-50%, -50%);
      border: none !important;
      box-shadow: none !important; 
    }

    /* ALTERAÇÃO: Laser inicia escondido (opacity: 0) */
    .laser-line {
      position: absolute; left: 5%; right: 5%; height: 3px;
      background: #ff4747; box-shadow: 0 0 12px #ff4747;
      animation: laserMove 2.2s ease-in-out infinite;
      z-index: 22;
      opacity: 0; 
      transition: opacity 0.5s;
    }
    
    /* Classe que o JavaScript vai adicionar para mostrar o laser */
    .laser-active { opacity: 1 !important; }

    @keyframes laserMove { 0%, 100% { top: 12%; } 50% { top: 88%; } }

    .scan-hint {
      position: absolute;
      left: 50%;
      top: calc(50% + 100px);
      transform: translateX(-50%);
      width: 90%;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
      z-index: 23;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .reading-status { margin-top: 14px; text-align: center; font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.92); }

    .cancel-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 16px auto 0;
      min-width: 180px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(180deg, #d62828 0%, #b71c1c 100%);
      color: #fff;
      font-weight: 700;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.22);
    }

    #successOverlay {
      position: fixed; inset: 0; background: rgba(0, 168, 89, 0.96);
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="app">
    <div class="logo-wrap">
      <img src="logo-inventjus.png" alt="Invent JUS">
    </div>

    <div class="title">Leitor de código de barras</div>
    <div class="subtitle">Centralize a etiqueta patrimonial dentro da área de leitura.</div>

    <div class="scanner-shell">
      <div id="reader"></div>
      <div class="overlay">
        <div class="scan-box">
          <div class="laser-line" id="laser"></div>
        </div>
        <div class="scan-hint" id="hint">Aproxime e mantenha o código alinhado na horizontal</div>
      </div>
    </div>

    <div class="reading-status" id="status-text">Iniciando...</div>

    <button class="cancel-btn" onclick="retornarAoApp('')">Cancelar</button>
  </div>

  <div id="successOverlay">
    <div style="font-size:72px">✔</div>
    <div style="font-size:22px; font-weight:800">TOMBO LIDO</div>
  </div>

  <script>
    const APP_URL = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let isReturning = false;

    function playSyntheticBeep() {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
        gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.2);
      } catch (e) { }
    }

    async function retornarAoApp(codigo = "") {
      if (isReturning) return;
      isReturning = true;

      if (codigo) {
        document.getElementById("successOverlay").style.display = "flex";
        playSyntheticBeep();
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      }

      const url = new URL(APP_URL);
      if (codigo) url.searchParams.set("tombo", codigo.replace(/\D/g, ""));
      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("t", Date.now());

      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch(e) {}
      }

      setTimeout(() => {
        window.top.location.replace(url.toString());
      }, codigo ? 400 : 0);
    }

    function iniciarScanner() {
      html5QrCode = new Html5Qrcode("reader");
      const config = { 
        fps: 25, 
        qrbox: { width: 300, height: 160 }, 
        aspectRatio: 1.0 
      };
      
      html5QrCode.start({ facingMode: "environment" }, config, (text) => {
        retornarAoApp(text);
      }).then(() => {
        // SUCESSO: A câmera abriu! Ativamos o laser e a dica visual agora
        document.getElementById('status-text').innerText = "Lendo...";
        document.getElementById('laser').classList.add('laser-active');
        document.getElementById('hint').classList.add('laser-active');
      }).catch(() => {
        document.getElementById('status-text').innerText = "Erro ao acessar câmera.";
      });
    }

    window.addEventListener("load", () => {
      setTimeout(iniciarScanner, 200);
    });
  </script>
</body>
</html>
