<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Scanner Invent JUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: #000; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; overflow: hidden; }
    .container { width: 90%; max-width: 400px; text-align: center; z-index: 5; }
    #reader { width: 100%; border-radius: 24px; overflow: hidden; background: #000; border: 2px solid rgba(255,255,255,0.1); }
    .btn-cancel { margin-top: 25px; width: 100%; padding: 16px; border: none; border-radius: 16px; background: #ff3b30; color: white; font-weight: bold; font-size: 16px; box-shadow: 0 4px 15px rgba(255,59,48,0.3); }
    #success { position: fixed; inset: 0; background: #34c759; display: none; align-items: center; justify-content: center; z-index: 99; font-size: 28px; font-weight: bold; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container">
    <div style="margin-bottom: 20px; font-weight: bold; opacity: 0.8;">SCANNER PATRIMONIAL</div>
    <div id="reader"></div>
    <button class="btn-cancel" onclick="retornarAoApp('')">✕ CANCELAR</button>
  </div>
  
  <div id="success">
    <span>✔</span>
    <div style="font-size: 18px; margin-top: 10px;">TOMBO LIDO</div>
  </div>

  <script>
    const APP_URL = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let finalizado = false;

    async function retornarAoApp(codigo) {
      if (finalizado) return;
      finalizado = true;

      // 1. Para o scanner imediatamente para liberar a CPU do iPhone
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) { console.log(e); }
      }

      // 2. Prepara a URL com cache-buster (t=timestamp)
      const url = new URL(APP_URL);
      if (codigo) url.searchParams.set("tombo", codigo);
      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("t", Date.now());

      if (codigo) document.getElementById("success").style.display = "flex";

      // 3. O PULO DO GATO PARA O SAFARI:
      // Usamos replace no nível mais alto (top) para garantir que a aba atual seja sobrescrita
      // Isso evita que o Safari empilhe abas no modo "App de Tela de Início"
      setTimeout(() => {
        window.top.location.replace(url.toString());
      }, codigo ? 500 : 0);
    }

    function onScanSuccess(decodedText) {
      const tombo = decodedText.replace(/\D/g, "");
      if (tombo && !finalizado) {
        if (navigator.vibrate) navigator.vibrate(200);
        retornarAoApp(tombo);
      }
    }

    window.onload = () => {
      html5QrCode = new Html5Qrcode("reader");
      const config = { 
        fps: 20, 
        qrbox: { width: 250, height: 120 },
        aspectRatio: 1.777
      };
      
      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(() => {
          // Fallback caso falhe a câmera traseira
          html5QrCode.start({ facingMode: "user" }, config, onScanSuccess);
        });
    };
  </script>
</body>
</html>
