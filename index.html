<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Invent JUS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, system-ui, sans-serif;
      color: #fff;
      /* Fundo moderno gradiente */
      background: radial-gradient(circle at top, rgba(64, 110, 255, 0.15), transparent 40%),
                  linear-gradient(180deg, #030d20 0%, #041127 100%);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .app-card {
      width: 90%; max-width: 400px;
      padding: 20px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.9; }

    #reader {
      width: 100%;
      height: 280px; /* Altura otimizada para abertura rápida */
      border-radius: 20px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    /* Remove bordas extras da biblioteca */
    #reader * { border: none !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

    /* Overlay de mira moderna */
    .scan-region {
      position: absolute; inset: 0;
      border: 2px solid transparent;
      background: linear-gradient(#fff, #fff) 50% 50%/70% 2px no-repeat, 
                  linear-gradient(#fff, #fff) 50% 50%/2px 40% no-repeat;
      pointer-events: none;
      z-index: 2; opacity: 0.3;
    }

    .btn-cancel {
      margin-top: 20px;
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 18px;
      background: rgba(255, 59, 48, 0.15);
      color: #ff453a;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #success-overlay {
      position: fixed; inset: 0;
      background: #34c759;
      display: none; align-items: center; justify-content: center;
      z-index: 100; font-weight: 800; font-size: 24px;
      animation: fadeIn 0.2s;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

  <div class="app-card">
    <div class="logo-text">INVENT JUS</div>
    <div id="reader"></div>
    <button class="btn-cancel" onclick="retornarAoApp('')">✕ CANCELAR</button>
  </div>

  <div id="success-overlay">CÓDIGO LIDO ✔</div>

  <script>
    const APP_URL = "https://inventario-patrimonial-orzkxr.flutterflow.app/listaBensInventariados";
    let html5QrCode = null;
    let isReturning = false;

    async function retornarAoApp(codigo) {
      if (isReturning) return;
      isReturning = true;

      // EXTREMA VELOCIDADE: Se houver código, mostra overlay verde imediatamente
      if (codigo) document.getElementById("success-overlay").style.display = "flex";

      const url = new URL(APP_URL);
      if (codigo) url.searchParams.set("tombo", codigo.replace(/\D/g, ""));
      url.searchParams.set("scanner_return", "1");
      url.searchParams.set("t", Date.now());

      // RETORNO RÁPIDO: Não espera o 'stop()' da câmera terminar para disparar o replace
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {}); 
      }
      
      // Troca de página agressiva para não perder tempo
      window.top.location.replace(url.toString());
    }

    function onScanSuccess(decodedText) {
      if (isReturning) return;
      if (navigator.vibrate) navigator.vibrate(80); // Vibração curta é mais rápida
      retornarAoApp(decodedText);
    }

    function iniciarScanner() {
      html5QrCode = new Html5Qrcode("reader");
      
      // Configurações mínimas = Abertura máxima
      const config = { 
        fps: 25, // Maior FPS para leitura instantânea
        qrbox: { width: 260, height: 130 },
        aspectRatio: 1.0 // Proporção 1:1 abre mais rápido no iOS
      };

      html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(() => {
          // Fallback silencioso
          document.getElementById("reader").innerHTML = '<button onclick="location.reload()" style="color:white;background:none;border:1px solid;padding:10px;border-radius:10px;">Ativar Câmera</button>';
        });
    }

    // DISPARO IMEDIATO
    if (document.readyState === "complete" || document.readyState === "interactive") {
      iniciarScanner();
    } else {
      window.addEventListener("load", iniciarScanner);
    }
  </script>
</body>
</html>
